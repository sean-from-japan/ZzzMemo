app = "zzzmemo"
primary_region = "nrt"

[build]

[env]
  PORT = "8080"
  HOST = "0.0.0.0"
  ZZZMEMO_USER = ""
  ZZZMEMO_PASS = ""
  GOOGLE_REDIRECT_URI = "https://zzzmemo.fly.dev/api/auth/callback"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0

  [http_service.concurrency]
    type = "requests"
    hard_limit = 100
    soft_limit = 80

[[mounts]]
  source = "zzzmemo_data"
  destination = "/app/data"

[[vm]]
  memory = "256mb"
  cpu_kind = "shared"
  cpus = 1
